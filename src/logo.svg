<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a7cfb" />
      <stop offset="100%" stop-color="#ff4757" />
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle Outline -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" opacity="0.15" />
  
  <!-- Outer Cinema Aperture Dots -->
  <circle cx="50" cy="12" r="2.5" fill="url(#logo-grad)" />
  <circle cx="77" cy="23" r="2.5" fill="url(#logo-grad)" opacity="0.8" />
  <circle cx="88" cy="50" r="2.5" fill="url(#logo-grad)" opacity="0.6" />
  <circle cx="77" cy="77" r="2.5" fill="url(#logo-grad)" opacity="0.8" />
  <circle cx="50" cy="88" r="2.5" fill="url(#logo-grad)" />
  <circle cx="23" cy="77" r="2.5" fill="url(#logo-grad)" opacity="0.8" />
  <circle cx="12" cy="50" r="2.5" fill="url(#logo-grad)" opacity="0.6" />
  <circle cx="23" cy="23" r="2.5" fill="url(#logo-grad)" opacity="0.8" />

  <!-- Stylized Film Frame Ring overlay -->
  <rect x="26" y="20" width="48" height="60" rx="8" fill="none" stroke="url(#logo-grad)" stroke-width="3" filter="url(#glow)" />

  <!-- Cinema clapper / Play Button emblem -->
  <path d="M38 34 C 38 32.5 39.6 31.5 41 32.5 L 67 48.5 C 68.4 49.5 68.4 51.5 67 52.5 L 41 68.5 C 39.6 69.5 38 68.5 38 67 L 38 34 Z" fill="url(#logo-grad)" filter="url(#glow)" />
  
  <!-- Film Sprocket holes on the left and right side of rect -->
  <rect x="30" y="26" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="30" y="38" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="30" y="50" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="30" y="62" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="30" y="70" width="4" height="4" rx="1" fill="#06070d" />

  <rect x="66" y="26" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="66" y="38" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="66" y="50" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="66" y="62" width="4" height="4" rx="1" fill="#06070d" />
  <rect x="66" y="70" width="4" height="4" rx="1" fill="#06070d" />
</svg>